<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Penn State E-Sports Club Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
   rel="stylesheet" crossorigin="anonymous"
   integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <section>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                <img src="lionlogo.png" alt="Logo" width="40">PSU E-Sports Club
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="registration.html">Register now</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="content.html">Content</a>
                </li>
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="cart.html">Cart</a>
                </li>
            </ul>
            </div>
        </div>
        </nav>
    </section>

    <!-- Search Bar -->
    <section>
        <div class="card p-3 mb-4">
                    <label for="searchInput" class="form-label"><strong>Search Events:</strong></label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Type to search events...">
                </div>
    </section>

    <section>
    <div class="container">
        <div class="row">

            <!-- Event List -->
            <div class="col-md-7">
                <div id="eventList" class="row g-5">
                   
                </div>
            </div>

            <!-- Cart -->
            <div class="col-md-5">
                <div class="card cart-section">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">🛒 Your Cart</h4>
                    </div>

                    <div class="card-body">
                        <div id="cartItems">
                            <p class="text-muted">Your cart is empty</p>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between align-items-center">
                            <h5>Total:</h5>
                            <h5 id="cartTotal">$0.00</h5>
                        </div>
                        <a href="shipping.html">
                        <button class="btn btn-success w-100 mt-3" id="checkoutBtn">
                            Checkout (AJAX Demo)
                        </button>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
