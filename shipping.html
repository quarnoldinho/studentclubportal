<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
   rel="stylesheet" crossorigin="anonymous"
   integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN">
    <link rel="stylesheet" href="styles.css">
    <style>
        .shipping-container {
            max-width: 600px;
            margin-top: 40px;
            margin-bottom: 60px;
        }

        .shipping-card {
            padding: 30px;
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }

        .shipping-card .card-header {
            background: linear-gradient(45deg, #2d7dbb, #4fa3e0);
            color: white;
            padding: 20px;
            margin: -30px -30px 20px -30px;
            border-radius: 0;
        }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 3px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="lionlogo.png" alt="Logo" width="40">PSU E-Sports Club
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="registration.html">Register now</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="content.html">Content</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="cart.html">Cart</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<main>
    <div class="container shipping-container">
        <div class="card shipping-card shadow-lg">
            <div class="card-header">
                <h2 class="mb-0">🚚 Shipping Selection</h2>
            </div>

            <div class="card-body">
                <form id="shippingForm">

                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control">
                        <div id="nameError" class="error"></div>
                    </div>

                    <!-- Address -->
                    <div class="mb-3">
                        <label class="form-label">Shipping Address</label>
                        <input type="text" id="address" class="form-control">
                        <div id="addressError" class="error"></div>
                    </div>

                    <!-- Carrier -->
                    <div class="mb-3">
                        <label class="form-label">Shipping Carrier</label>
                        <select id="carrier" class="form-select">
                            <option value="">Select Carrier</option>
                            <option value="UPS">UPS</option>
                            <option value="FedEx">FedEx</option>
                            <option value="USPS">USPS</option>
                        </select>
                        <div id="carrierError" class="error"></div>
                    </div>

                    <!-- Method -->
                    <div class="mb-3">
                        <label class="form-label">Shipping Method</label>
                        <select id="method" class="form-select">
                            <option value="">Select Method</option>
                            <option value="Standard">Standard (3-5 days)</option>
                            <option value="Express">Express (2 days)</option>
                            <option value="Overnight">Overnight</option>
                        </select>
                        <div id="methodError" class="error"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Submit Shipping Info
                    </button>

                </form>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 Penn State E-Sports Club. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="shipping.js"></script>

</body>

</html>
